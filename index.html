<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลาเข้า-ออกงาน - โรงเรียนตาลสุมพัฒนา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; }
        .clock-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="clock-gradient p-8 text-white text-center">
            <h1 class="text-xl font-medium mb-1 opacity-90">โรงเรียนตาลสุมพัฒนา</h1>
            <h2 class="text-2xl font-bold mb-3">ลงเวลาปฏิบัติราชการ</h2>
            <div id="current-time" class="text-5xl font-mono font-bold mb-2">00:00:00</div>
            <p id="current-date" class="text-sm opacity-90">วันที่ --/--/----</p>
            
            <!-- แสดงตำแหน่งและระยะทางใต้ส่วนวันที่ -->
            <div class="mt-4 pt-4 border-t border-white/20 text-xs flex flex-col gap-1">
                <div class="flex justify-center items-center gap-2">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>พิกัดปัจจุบัน: <span id="display-coords" class="font-mono">กำลังตรวจสอบ...</span></span>
                </div>
                <div class="flex justify-center items-center gap-2">
                    <i class="fas fa-ruler"></i>
                    <span>ระยะห่างจากโรงเรียน: <span id="display-distance" class="font-bold">-</span> เมตร</span>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="p-8">
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">เลือกชื่อ-นามสกุล</label>
                <select id="employee-name" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-white appearance-none cursor-pointer">
                    <option value="">กำลังโหลดรายชื่อครู...</option>
                </select>
            </div>

            <!-- การ์ดแจ้งเตือนสถานะพิกัด -->
            <div id="location-status" class="mb-6 p-4 rounded-xl bg-gray-50 text-gray-600 text-sm flex items-start border border-gray-100">
                <i class="fas fa-info-circle mt-1 mr-3 text-blue-500"></i>
                <span id="status-text">ระบบกำลังค้นหาตำแหน่งพิกัดของคุณ...</span>
            </div>

            <!-- ปุ่มลงเวลา -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="submitTime('IN')" id="btn-in" disabled
                    class="flex flex-col items-center justify-center py-5 bg-emerald-500 hover:bg-emerald-600 disabled:bg-gray-300 text-white rounded-2xl transition-all shadow-lg active:transform active:scale-95">
                    <i class="fas fa-sign-in-alt text-2xl mb-1"></i>
                    <span class="font-bold">ลงเวลามา</span>
                </button>
                <button onclick="submitTime('OUT')" id="btn-out" disabled
                    class="flex flex-col items-center justify-center py-5 bg-rose-500 hover:bg-rose-600 disabled:bg-gray-300 text-white rounded-2xl transition-all shadow-lg active:transform active:scale-95">
                    <i class="fas fa-sign-out-alt text-2xl mb-1"></i>
                    <span class="font-bold">ลงเวลากลับ</span>
                </button>
            </div>

            <!-- ปุ่มสถิติประจำวัน (ลิงก์ภายนอก) -->
            <a id="stats-link" href="#"  class="w-full py-4 bg-blue-50 text-blue-700 rounded-2xl font-medium hover:bg-blue-100 transition-colors flex items-center justify-center gap-2 border border-blue-100">
                <i class="fas fa-chart-bar"></i>
                ดูสถิติประจำวัน
            </a>
        </div>

        <div class="px-8 pb-6 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Tansum Patthana School • Attendance System</p>
        </div>
    </div>

    <!-- Modal แจ้งเตือนสถานะ -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-sm w-full text-center shadow-2xl">
            <div id="modal-icon" class="text-6xl mb-4"></div>
            <h3 id="modal-title" class="text-2xl font-bold mb-2 text-gray-800"></h3>
            <p id="modal-message" class="text-gray-600 mb-8"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-black transition-colors">ตกลง</button>
        </div>
    </div>

    <script>
        // --- ส่วนตั้งค่าที่ต้องอัปเดต ---
        const SCHOOL_LAT = 15.316909; 
        const SCHOOL_LNG = 105.157185;
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9kBOrTGo0Xn1WTV6vo--QA0fdMoca03_58USeQ6TQ5wUc2dN3AjCiJH9FRaPfCsmK/exec'; 
        
        // ใส่ลิงก์สถิติของคุณที่นี่
        const EXTERNAL_STATS_URL = 'https://chalermpon-coder.github.io/CheckInTime/stat.html'; 

        let userCoords = null;

        // อัปเดตลิงก์สถิติ
        document.getElementById('stats-link').href = EXTERNAL_STATS_URL;

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('th-TH', { hour12: false });
            document.getElementById('current-date').textContent = now.toLocaleDateString('th-TH', { 
                year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchTeachers() {
            const select = document.getElementById('employee-name');
            if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_GOOGLE')) {
                select.innerHTML = '<option value="">กรุณาตั้งค่า SCRIPT_URL</option>';
                return;
            }
            try {
                const response = await fetch(SCRIPT_URL);
                const names = await response.json();
                if (names.length > 0) {
                    select.innerHTML = '<option value="">-- เลือกชื่อของคุณ --</option>';
                    names.forEach(name => {
                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        select.appendChild(opt);
                    });
                } else {
                    select.innerHTML = '<option value="">ไม่พบรายชื่อในระบบ</option>';
                }
            } catch (error) {
                console.error('Error fetching teachers:', error);
                select.innerHTML = '<option value="">โหลดข้อมูลล้มเหลว</option>';
            }
        }

        function initLocation() {
            if (!navigator.geolocation) {
                updateStatus('เบราว์เซอร์ไม่รองรับระบบ GPS', 'error');
                return;
            }
            const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };
            navigator.geolocation.watchPosition(
                (pos) => {
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const dist = calculateDistance(userCoords.lat, userCoords.lng, SCHOOL_LAT, SCHOOL_LNG);
                    document.getElementById('display-coords').textContent = `${userCoords.lat.toFixed(6)}, ${userCoords.lng.toFixed(6)}`;
                    document.getElementById('display-distance').textContent = Math.round(dist).toLocaleString();
                    updateStatus('ระบุตำแหน่งพิกัดแล้ว พร้อมสำหรับการลงเวลา', 'success');
                    document.getElementById('btn-in').disabled = false;
                    document.getElementById('btn-out').disabled = false;
                },
                (err) => {
                    let msg = 'ไม่สามารถเข้าถึงตำแหน่งได้';
                    if(err.code === 1) msg = 'กรุณาอนุญาตให้แอปเข้าถึงตำแหน่ง (GPS)';
                    updateStatus(msg, 'error');
                },
                options
            );
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function updateStatus(text, type) {
            const statusDiv = document.getElementById('location-status');
            const statusText = document.getElementById('status-text');
            statusText.textContent = text;
            if (type === 'error') {
                statusDiv.className = 'mb-6 p-4 rounded-xl bg-red-50 text-red-700 text-sm flex items-start border border-red-100';
            } else {
                statusDiv.className = 'mb-6 p-4 rounded-xl bg-emerald-50 text-emerald-700 text-sm flex items-start border border-emerald-100';
            }
        }

        async function submitTime(type) {
            const name = document.getElementById('employee-name').value;
            if (!name) {
                showModal('แจ้งเตือน', 'กรุณาเลือกชื่อของคุณก่อนลงเวลา', '⚠️');
                return;
            }
            const distVal = document.getElementById('display-distance').textContent;
            const btn = type === 'IN' ? document.getElementById('btn-in') : document.getElementById('btn-out');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin text-2xl"></i>';
            const payload = { name: name, type: type, distance: distVal.replace(/,/g, ''), lat: userCoords.lat, lng: userCoords.lng };
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                showModal('สำเร็จ', `ลงเวลา${type === 'IN' ? 'มา' : 'กลับ'}สำเร็จ เรียบร้อยแล้ว`, '✅');
            } catch (error) {
                showModal('ล้มเหลว', 'เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่', '❌');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        function showModal(title, msg, icon) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = msg;
            document.getElementById('modal-icon').textContent = icon;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        window.onload = () => {
            initLocation();
            fetchTeachers();
        };
    </script>
</body>
</html>
